<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Korean Core Starter</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <link rel="stylesheet" href="./styles.css?v=20260528-nav-1">
</head>
<body>
  <header class="topbar">
    <button class="brand" id="homeButton" type="button" title="Home">
      <span class="brand-mark">한</span>
      <span class="brand-text">Korean Core Starter</span>
    </button>
    <nav class="mode-tabs" aria-label="Study mode">
      <button class="mode-tab is-active" type="button" data-mode="course">Course</button>
      <button class="mode-tab" type="button" data-mode="browse">Browse</button>
      <button class="mode-tab" type="button" data-mode="flashcard">Flashcard</button>
      <button class="mode-tab" type="button" data-mode="quiz">Quiz</button>
    </nav>
    <button class="icon-button" id="searchButton" type="button" aria-label="Search" title="Search">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"/></svg>
    </button>
  </header>

  <div class="app-shell">
    <aside class="rail" aria-label="Filters">
      <label class="search-box">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"/></svg>
        <input id="searchInput" type="search" placeholder="Search Korean or English">
      </label>

      <section class="filter-block">
        <div class="filter-title">Type</div>
        <div class="filter-list" id="typeFilters"></div>
      </section>
      <section class="filter-block">
        <div class="filter-title">Level</div>
        <div class="filter-list" id="levelFilters"></div>
      </section>
      <section class="filter-block">
        <div class="filter-title">Topic</div>
        <div class="filter-list" id="topicFilters"></div>
      </section>
      <section class="filter-block">
        <div class="filter-title">Part of speech</div>
        <div class="filter-list" id="posFilters"></div>
      </section>
      <section class="filter-block">
        <div class="filter-title">Conjugation</div>
        <div class="filter-list">
          <button class="filter-row" type="button" data-toggle="hasConjugation">Has conjugation <span id="hasConjugationCount"></span></button>
          <button class="filter-row" type="button" data-toggle="irregular">Irregular <span id="irregularCount"></span></button>
        </div>
      </section>
      <button class="clear-button" id="clearFilters" type="button">Clear filters</button>
    </aside>

    <main class="workspace">
      <section class="pane is-active" id="coursePane" aria-label="Course">
        <div id="courseView"></div>
      </section>

      <section class="pane" id="browsePane" aria-label="Browse">
        <div id="browseView"></div>
      </section>

      <section class="pane study-pane" id="flashcardPane" aria-label="Flashcard">
        <div class="study-strip">
          <span id="deckInfo">Deck: 0</span>
          <button class="small-button" id="shuffleDeck" type="button">Shuffle</button>
          <div class="progress"><span id="flashProgress"></span></div>
          <span id="flashCounter">0 / 0</span>
        </div>
        <article class="flashcard" id="flashcard"></article>
        <div class="study-actions" id="flashActions"></div>
      </section>

      <section class="pane study-pane" id="quizPane" aria-label="Quiz">
        <article class="quiz-card" id="quizCard"></article>
      </section>
    </main>
  </div>

  <div class="modal" id="detailModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Entry details">
      <button class="modal-close" id="modalClose" type="button" aria-label="Close">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="palette-modal" id="paletteModal" aria-hidden="true">
    <div class="palette" role="dialog" aria-modal="true" aria-label="Search entries">
      <label class="palette-input-wrap">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"/></svg>
        <input id="paletteInput" type="search" placeholder="Search Korean Core Starter">
      </label>
      <div class="palette-results" id="paletteResults"></div>
    </div>
  </div>

  <script>
    window.KOREAN_CORE_SERVER_URL = 'http://127.0.0.1:4173/korean/';
  </script>
  <script src="./data-bundle.js?v=20260528-nav-1" defer></script>
  <script src="./app.js?v=20260528-nav-1" defer></script>
</body>
</html>
